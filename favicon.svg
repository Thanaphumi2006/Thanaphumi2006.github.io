<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="48" height="48" rx="12" fill="url(#bgGrad)"/>


  <!-- Glowing orb in background -->
  <circle cx="38" cy="38" r="12" fill="#7c3aed" opacity="0.15"/>
  <circle cx="10" cy="10" r="8" fill="#06b6d4" opacity="0.1"/>

  <!-- Main P letter with glow -->
  <g filter="url(#glow)">
    <text x="24" y="36" font-family="Georgia, serif" font-size="34" font-weight="700" fill="url(#letterGrad)" text-anchor="middle" font-style="italic">P</text>
  </g>

  <!-- Subtle sparkle accents -->
  <circle cx="36" cy="12" r="1.5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="40" cy="16" r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="8" cy="40" r="1" fill="#6366f1" opacity="0.6"/>
</svg>